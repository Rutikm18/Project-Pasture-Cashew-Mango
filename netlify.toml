# Netlify config for Pasture
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  publish = "."
  # No build command — static site

# Serve cashew.html at the root (like vercel.json rewrite)
[[redirects]]
  from = "/"
  to = "/cashew.html"
  status = 200

# Proxy API routes to Netlify Functions
[[redirects]]
  from = "/api/config"
  to = "/.netlify/functions/config"
  status = 200

[[redirects]]
  from = "/api/order"
  to = "/.netlify/functions/order"
  status = 200

[[redirects]]
  from = "/api/notify"
  to = "/.netlify/functions/notify"
  status = 200
